  <script>
    var dados = JSON.parse(document.getElementById('dados-curadoria').textContent);
    var statRowEl = document.getElementById('stat-row');
    var resumoDiaEl = document.getElementById('widget-resumo-dia');
    var topCategoriasEl = document.getElementById('widget-top-categorias');
    var topFontesEl = document.getElementById('widget-top-fontes');
    var listaItensEl = document.getElementById('lista-itens');
    var filtrosEl = document.getElementById('filtros');
    var filtrosDiaEl = document.getElementById('filtros-dia');
    var contadorEl = document.getElementById('contador');
    var buscaEl = document.getElementById('busca');

    var MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

    function formatarData(iso) {
      var partes = iso.split('-');
      if (partes.length !== 3) return iso;
      var ano = partes[0], mes = parseInt(partes[1], 10) - 1, dia = parseInt(partes[2], 10);
      if (mes < 0 || mes > 11) return iso;
      return dia + ' de ' + MESES[mes] + ' de ' + ano;
    }

    function extrairTitulo(texto) {
      var m = texto.match(/^\*\*([^*]+)\*\*/);
      if (m) return m[1];
      return texto.length > 90 ? texto.slice(0, 90) + '…' : texto;
    }

    function extrairFonte(texto) {
      var m = texto.match(/—\s*([^.]+)\./);
      if (!m) return null;
      return m[1].replace(/,\s*\d{1,2}\/\d{1,2}\s*$/, '').trim();
    }

    function extrairLink(texto) {
      var m = texto.match(/\[([^\]]+)\]\(([^)]+)\)/);
      return m ? m[2] : null;
    }

    function corCategoria(cat) {
      var c = cat.toLowerCase();
      if (c.indexOf('destaque') !== -1) return 'bg-red-600 text-white';
      if (c.indexOf('imposto') !== -1 || c.indexOf('legisla') !== -1) return 'bg-rose-100 text-rose-700';
      if (c.indexOf('elétric') !== -1 || c.indexOf('eletric') !== -1 || c.indexOf('híbrid') !== -1 || c.indexOf('hibrid') !== -1) return 'bg-emerald-100 text-emerald-700';
      if (c.indexOf('lançamento') !== -1 || c.indexOf('lancamento') !== -1 || c.indexOf('novidade') !== -1) return 'bg-blue-100 text-blue-700';
      if (c.indexOf('campanha') !== -1) return 'bg-fuchsia-100 text-fuchsia-700';
      if (c.indexOf('marketing') !== -1 || c.indexOf('publicidade') !== -1) return 'bg-purple-100 text-purple-700';
      if (c.indexOf('varejo') !== -1 || c.indexOf('concession') !== -1) return 'bg-orange-100 text-orange-700';
      if (c.indexOf('mercado') !== -1 || c.indexOf('compra') !== -1 || c.indexOf('venda') !== -1) return 'bg-sky-100 text-sky-700';
      return 'bg-stone-100 text-stone-600';
    }

    function corCategoriaSolida(cat) {
      var c = cat.toLowerCase();
      if (c.indexOf('destaque') !== -1) return 'bg-red-600';
      if (c.indexOf('imposto') !== -1 || c.indexOf('legisla') !== -1) return 'bg-rose-500';
      if (c.indexOf('elétric') !== -1 || c.indexOf('eletric') !== -1 || c.indexOf('híbrid') !== -1 || c.indexOf('hibrid') !== -1) return 'bg-emerald-500';
      if (c.indexOf('lançamento') !== -1 || c.indexOf('lancamento') !== -1 || c.indexOf('novidade') !== -1) return 'bg-blue-500';
      if (c.indexOf('campanha') !== -1) return 'bg-fuchsia-500';
      if (c.indexOf('marketing') !== -1 || c.indexOf('publicidade') !== -1) return 'bg-purple-500';
      if (c.indexOf('varejo') !== -1 || c.indexOf('concession') !== -1) return 'bg-orange-500';
      if (c.indexOf('mercado') !== -1 || c.indexOf('compra') !== -1 || c.indexOf('venda') !== -1) return 'bg-sky-500';
      return 'bg-stone-400';
    }

    function categoriaCanonica(cat) {
      var c = cat.toLowerCase();
      if (c.indexOf('imposto') !== -1 || c.indexOf('legisla') !== -1) return 'Impostos e legislação';
      if (c.indexOf('elétric') !== -1 || c.indexOf('eletric') !== -1 || c.indexOf('híbrid') !== -1 || c.indexOf('hibrid') !== -1) return 'Elétricos e híbridos';
      if (c.indexOf('lançamento') !== -1 || c.indexOf('lancamento') !== -1 || c.indexOf('novidade') !== -1) return 'Lançamentos';
      if (c.indexOf('campanha') !== -1) return 'Campanhas';
      if (c.indexOf('marketing') !== -1 || c.indexOf('publicidade') !== -1) return 'Marketing e publicidade';
      if (c.indexOf('varejo') !== -1 || c.indexOf('concession') !== -1) return 'Varejo e concessionária';
      if (c.indexOf('mercado') !== -1 || c.indexOf('compra') !== -1 || c.indexOf('venda') !== -1) return 'Mercado e vendas';
      return 'Notícias gerais';
    }

    // --- Stat row ---
    function renderStatRow() {
      if (dados.length === 0) return;
      var recente = dados[0];
      var categoriasHoje = Object.keys(recente.categorias || {}).filter(function (c) { return c !== 'Destaques do dia'; });
      var totalHoje = 0;
      categoriasHoje.forEach(function (c) { totalHoje += recente.categorias[c].length; });

      var heroCard = document.createElement('div');
      heroCard.className = 'rounded-2xl p-6 text-white shadow-sm bg-red-600';
      var heroNum = document.createElement('p');
      heroNum.className = 'text-3xl font-bold';
      heroNum.textContent = totalHoje;
      var heroLabel = document.createElement('p');
      heroLabel.className = 'text-sm text-white/90 mt-1';
      heroLabel.textContent = 'Notícias no digest de ' + formatarData(recente.data);
      heroCard.appendChild(heroNum);
      heroCard.appendChild(heroLabel);
      statRowEl.appendChild(heroCard);

      function statCard(numero, label) {
        var card = document.createElement('div');
        card.className = 'bg-white border border-stone-200 rounded-2xl shadow-sm p-6';
        var num = document.createElement('p');
        num.className = 'text-3xl font-bold text-stone-900';
        num.textContent = numero;
        var lab = document.createElement('p');
        lab.className = 'text-sm text-stone-500 mt-1';
        lab.textContent = label;
        card.appendChild(num);
        card.appendChild(lab);
        return card;
      }

      statRowEl.appendChild(statCard(categoriasHoje.length, 'Categorias ativas hoje'));
      statRowEl.appendChild(statCard(dados.length, 'Digests carregados'));
    }

    // --- Widget: resumo do dia ---
    function renderResumoDia() {
      var titulo = document.createElement('p');
      titulo.className = 'text-sm font-bold text-stone-900 mb-4';
      titulo.textContent = 'Resumo do dia';
      resumoDiaEl.appendChild(titulo);

      if (dados.length === 0) {
        var vazio = document.createElement('p');
        vazio.className = 'text-sm text-stone-400';
        vazio.textContent = 'Sem dados ainda.';
        resumoDiaEl.appendChild(vazio);
        return;
      }

      var recente = dados[0];
      var categorias = recente.categorias || {};
      var catsNormais = Object.keys(categorias).filter(function (c) { return c !== 'Destaques do dia'; });
      var totalNoticias = 0;
      catsNormais.forEach(function (c) { totalNoticias += categorias[c].length; });
      var comLink = 0;
      catsNormais.forEach(function (c) {
        categorias[c].forEach(function (item) { if (item.indexOf('[') !== -1) comLink++; });
      });

      var grid = document.createElement('div');
      grid.className = 'grid grid-cols-3 gap-2 text-center mb-4';

      function miniStat(numero, label) {
        var box = document.createElement('div');
        var num = document.createElement('p');
        num.className = 'text-xl font-bold text-stone-900';
        num.textContent = numero;
        var lab = document.createElement('p');
        lab.className = 'text-[10px] text-stone-500 mt-0.5 leading-tight';
        lab.textContent = label;
        box.appendChild(num);
        box.appendChild(lab);
        return box;
      }

      grid.appendChild(miniStat(totalNoticias, 'Notícias'));
      grid.appendChild(miniStat(catsNormais.length, 'Categorias'));
      grid.appendChild(miniStat(comLink, 'Com fonte'));
      resumoDiaEl.appendChild(grid);

      var destaquesLista = categorias['Destaques do dia'];
      if (destaquesLista && destaquesLista.length > 0) {
        var box = document.createElement('div');
        box.className = 'bg-red-50 border border-red-200 rounded-xl p-3';
        var label = document.createElement('p');
        label.className = 'text-[10px] font-bold uppercase tracking-wide text-red-600 mb-1.5';
        label.textContent = destaquesLista.length + ' destaque' + (destaquesLista.length > 1 ? 's' : '') + ' hoje';
        box.appendChild(label);
        var listaDestaques = document.createElement('ul');
        listaDestaques.className = 'space-y-1.5 list-disc list-inside';
        destaquesLista.forEach(function (texto) {
          var li = document.createElement('li');
          li.className = 'text-xs text-stone-700 leading-relaxed';
          li.textContent = texto;
          listaDestaques.appendChild(li);
        });
        box.appendChild(listaDestaques);
        resumoDiaEl.appendChild(box);
      }
    }

    // --- Widget: categorias em destaque (ranking) ---
    function renderTopCategorias() {
      var titulo = document.createElement('p');
      titulo.className = 'text-sm font-bold text-stone-900 mb-4';
      titulo.textContent = 'Categorias em destaque';
      topCategoriasEl.appendChild(titulo);

      var contagem = {};
      dados.forEach(function (dia) {
        var categorias = dia.categorias || {};
        Object.keys(categorias).filter(function (c) { return c !== 'Destaques do dia'; }).forEach(function (cat) {
          var rotulo = categoriaCanonica(cat);
          contagem[rotulo] = (contagem[rotulo] || 0) + categorias[cat].length;
        });
      });

      var rotulos = Object.keys(contagem).sort(function (a, b) { return contagem[b] - contagem[a]; });

      if (rotulos.length === 0) {
        var vazio = document.createElement('p');
        vazio.className = 'text-sm text-stone-400';
        vazio.textContent = 'Sem dados ainda.';
        topCategoriasEl.appendChild(vazio);
        return;
      }

      var max = contagem[rotulos[0]];
      var lista = document.createElement('div');
      lista.className = 'space-y-3';

      rotulos.forEach(function (rotulo) {
        var linha = document.createElement('div');

        var topo = document.createElement('div');
        topo.className = 'flex items-center justify-between text-xs mb-1';
        var nome = document.createElement('span');
        nome.className = 'text-stone-700 font-medium';
        nome.textContent = rotulo;
        var num = document.createElement('span');
        num.className = 'text-stone-400';
        num.textContent = contagem[rotulo];
        topo.appendChild(nome);
        topo.appendChild(num);
        linha.appendChild(topo);

        var trilha = document.createElement('div');
        trilha.className = 'w-full h-1.5 bg-stone-100 rounded-full overflow-hidden';
        var barra = document.createElement('div');
        barra.className = 'h-full rounded-full ' + corCategoriaSolida(rotulo);
        barra.style.width = Math.max(8, Math.round((contagem[rotulo] / max) * 100)) + '%';
        trilha.appendChild(barra);
        linha.appendChild(trilha);

        lista.appendChild(linha);
      });
      topCategoriasEl.appendChild(lista);
    }

    // --- Widget: fontes mais citadas ---
    function renderTopFontes() {
      var titulo = document.createElement('p');
      titulo.className = 'text-sm font-bold text-stone-900 mb-4';
      titulo.textContent = 'Fontes mais citadas';
      topFontesEl.appendChild(titulo);

      var contagem = {};
      todosItens.forEach(function (item) {
        var fonte = extrairFonte(item.texto);
        if (!fonte) return;
        contagem[fonte] = (contagem[fonte] || 0) + 1;
      });

      var nomes = Object.keys(contagem).sort(function (a, b) { return contagem[b] - contagem[a]; }).slice(0, 8);

      if (nomes.length === 0) {
        var vazio = document.createElement('p');
        vazio.className = 'text-sm text-stone-400';
        vazio.textContent = 'Sem dados ainda.';
        topFontesEl.appendChild(vazio);
        return;
      }

      var lista = document.createElement('div');
      lista.className = 'space-y-2';
      nomes.forEach(function (nome) {
        var linha = document.createElement('div');
        linha.className = 'flex items-center justify-between gap-2 text-xs';
        var span = document.createElement('span');
        span.className = 'text-stone-700 truncate';
        span.textContent = nome;
        var num = document.createElement('span');
        num.className = 'text-stone-400 font-semibold flex-shrink-0';
        num.textContent = contagem[nome];
        linha.appendChild(span);
        linha.appendChild(num);
        lista.appendChild(linha);
      });
      topFontesEl.appendChild(lista);
    }

    // --- Lista completa: achata todos os itens (sem Destaques do dia) ---
    var todosItens = [];
    dados.forEach(function (dia) {
      var categorias = dia.categorias || {};
      Object.keys(categorias).filter(function (c) { return c !== 'Destaques do dia'; }).forEach(function (cat) {
        categorias[cat].forEach(function (texto) {
          todosItens.push({ cat: cat, texto: texto, data: dia.data });
        });
      });
    });

    function fonteDoItem(item) {
      return extrairFonte(item.texto) || 'Outras fontes';
    }

    var fontesUnicas = [];
    todosItens.forEach(function (it) { var f = fonteDoItem(it); if (fontesUnicas.indexOf(f) === -1) fontesUnicas.push(f); });
    var diasUnicos = [];
    dados.forEach(function (d) { if (diasUnicos.indexOf(d.data) === -1) diasUnicos.push(d.data); });

    var fontesAtivas = {};
    fontesUnicas.forEach(function (f) { fontesAtivas[f] = true; });
    var diasAtivos = {};
    diasUnicos.forEach(function (d) { diasAtivos[d] = true; });

    var linhasTodas = [];

    function montarLinha(item) {
      var linha = document.createElement('div');
      linha.className = 'flex items-start gap-3 py-3 border-b border-stone-100 last:border-0';
      linha.dataset.cat = item.cat;
      linha.dataset.fonte = fonteDoItem(item);
      linha.dataset.diaData = item.data;
      linha.dataset.busca = (item.cat + ' ' + item.texto).toLowerCase();

      var bolinha = document.createElement('span');
      bolinha.className = 'w-2.5 h-2.5 rounded-full mt-1.5 flex-shrink-0 ' + corCategoriaSolida(item.cat);
      linha.appendChild(bolinha);

      var corpo = document.createElement('div');
      corpo.className = 'flex-1 min-w-0';

      var tit = document.createElement('p');
      tit.className = 'text-sm text-stone-800 font-medium leading-snug';
      tit.textContent = extrairTitulo(item.texto);
      corpo.appendChild(tit);

      var meta = document.createElement('div');
      meta.className = 'flex items-center gap-2 mt-1.5 flex-wrap';

      var badge = document.createElement('span');
      badge.className = 'text-[9px] font-bold uppercase tracking-wide px-2 py-0.5 rounded-full ' + corCategoria(item.cat);
      badge.textContent = item.cat;
      meta.appendChild(badge);

      var dataSpan = document.createElement('span');
      dataSpan.className = 'text-[11px] text-stone-400';
      dataSpan.textContent = formatarData(item.data);
      meta.appendChild(dataSpan);

      var url = extrairLink(item.texto);
      var fonte = extrairFonte(item.texto);
      if (url) {
        var link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.className = 'text-[11px] font-semibold text-blue-700 hover:text-blue-900';
        link.textContent = (fonte || 'Fonte') + ' ↗';
        meta.appendChild(link);
      } else if (fonte) {
        var fonteSpan = document.createElement('span');
        fonteSpan.className = 'text-[11px] text-stone-400';
        fonteSpan.textContent = fonte;
        meta.appendChild(fonteSpan);
      }

      corpo.appendChild(meta);
      linha.appendChild(corpo);
      return linha;
    }

    function renderListaItens() {
      listaItensEl.innerHTML = '';
      linhasTodas = [];
      if (todosItens.length === 0) {
        listaItensEl.innerHTML = '<p class="text-stone-400 text-sm">Nenhuma notícia encontrada em curadoria/ ainda.</p>';
        return;
      }
      todosItens.forEach(function (item) {
        var linha = montarLinha(item);
        listaItensEl.appendChild(linha);
        linhasTodas.push(linha);
      });
    }

    function renderFiltrosFonte() {
      filtrosEl.innerHTML = '';
      fontesUnicas.forEach(function (fonte) {
        var btn = document.createElement('button');
        var ativo = fontesAtivas[fonte];
        btn.type = 'button';
        btn.className = 'text-[11px] font-semibold px-3 py-1.5 rounded-full border transition-colors ' +
          (ativo ? 'bg-blue-700 text-white border-transparent' : 'bg-white text-stone-400 border-stone-200');
        btn.textContent = fonte;
        btn.addEventListener('click', function () {
          fontesAtivas[fonte] = !fontesAtivas[fonte];
          renderFiltrosFonte();
          aplicarFiltros();
        });
        filtrosEl.appendChild(btn);
      });
    }

    function renderFiltrosDia() {
      filtrosDiaEl.innerHTML = '';
      diasUnicos.forEach(function (d) {
        var btn = document.createElement('button');
        var ativo = diasAtivos[d];
        btn.type = 'button';
        btn.className = 'text-[11px] font-semibold px-3 py-1.5 rounded-full border transition-colors ' +
          (ativo ? 'bg-stone-800 text-white border-transparent' : 'bg-white text-stone-400 border-stone-200');
        btn.textContent = formatarData(d);
        btn.addEventListener('click', function () {
          diasAtivos[d] = !diasAtivos[d];
          renderFiltrosDia();
          aplicarFiltros();
        });
        filtrosDiaEl.appendChild(btn);
      });
    }

    function aplicarFiltros() {
      var query = buscaEl.value.trim().toLowerCase();
      var visiveis = 0;
      linhasTodas.forEach(function (linha) {
        var passaFonte = fontesAtivas[linha.dataset.fonte];
        var passaDia = diasAtivos[linha.dataset.diaData];
        var passaBusca = query === '' || linha.dataset.busca.indexOf(query) !== -1;
        var visivel = passaFonte && passaDia && passaBusca;
        linha.style.display = visivel ? '' : 'none';
        if (visivel) visiveis++;
      });
      contadorEl.textContent = 'Mostrando ' + visiveis + ' de ' + linhasTodas.length + ' notícias';
    }

    renderStatRow();
    renderResumoDia();
    renderTopCategorias();
    renderTopFontes();
    renderListaItens();
    renderFiltrosFonte();
    renderFiltrosDia();
    aplicarFiltros();
    buscaEl.addEventListener('input', aplicarFiltros);
  </script>
</body>
</html>
