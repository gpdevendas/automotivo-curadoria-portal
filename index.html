  <script id="dados-curadoria" type="application/json">[{"data":"2026-06-22","categorias":{"Compra e venda / mercado":["**Ranking de vendas até 14/06: VW Polo lidera** — Diário de Pernambuco. Volkswagen Polo no topo com 4.333 unidades, seguido por VW T-Cross (3.858), Hyundai HB20 (3.518), Fiat Argo (3.296) e VW Tera (3.140). Volkswagen ocupa 3 das 5 primeiras posições. [Diário de Pernambuco](https://diariodepernambuco.com.br/dpmais/5-carros-mais-vendidos-do-brasil-em-junho-de-2026/)","**Projeção 2026 mantém entre 2,4 e 2,6 milhões de unidades** — Chaves na Mão / Anfavea. Elétricos e híbridos podem superar 18% do total vendido no ano. Eletrificação, conectividade e avanço de marcas chinesas continuam pressionando montadoras tradicionais. [Chaves na Mão](https://www.chavesnamao.com.br/blog/noticias-automotivas/setor-automotivo-2026-tendencias-brasil/) / [Agência Brasil](https://agenciabrasil.ebc.com.br/economia/noticia/2026-01/anfavea-projeta-crescimento-de-37-na-producao-de-veiculos-para-2026)"],"Marketing e publicidade (geral)":["**Verba digital pode passar de 50% do bolo publicitário brasileiro em 2026** — Meio \u0026 Mensagem. Tendências de mídia apontam aumento da fatia digital no orçamento total de publicidade no país. [Meio \u0026 Mensagem](https://www.meioemensagem.com.br/midia/quais-sao-as-principais-tendencias-de-midia-para-2026)","**IA se consolida como infraestrutura do marketing, não só feature extra** — Creative Hut. 2026 marca fase de menos produção dispersa e mais estratégia orientada a receita, com IA operacional embutida no processo. [Creative Hut](https://creativehut.com.br/marketing-digital/5-revolucoes-do-marketing-digital-em-2026-segundo-especialistas/)","**Web Summit Rio e evento de performance/automação movimentam junho** — Web Summit Rio aconteceu de 8 a 11/06 no Rio; evento de marketing digital, performance, automação e social ads em São Paulo nos dias 18 e 19/06."],"Marketing automotivo / concessionária":["**Jornada do cliente passa de \"que   <script>
    const dados = JSON.parse(document.getElementById('dados-curadoria').textContent);
    const app = document.getElementById('app');

    function linkify(texto) {
      return texto.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-sky-400 hover:underline">$1</a>');
    }

    dados.forEach(dia => {
      const card = document.createElement('div');
      card.className = 'bg-neutral-900 rounded-xl border border-neutral-800 p-6';

      const titulo = document.createElement('h2');
      titulo.className = 'text-lg font-semibold mb-4';
      titulo.textContent = dia.data;
      card.appendChild(titulo);

      const categorias = dia.categorias || {};
      Object.keys(categorias).forEach(cat => {
        const bloco = document.createElement('div');
        bloco.className = 'mb-4';

        const catTitulo = document.createElement('h3');
        catTitulo.className = 'text-sm font-semibold text-amber-400 uppercase tracking-wide mb-2';
        catTitulo.textContent = cat;
        bloco.appendChild(catTitulo);

        const lista = document.createElement('ul');
        lista.className = 'space-y-2 text-sm text-neutral-300 list-disc list-inside';
        categorias[cat].forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = linkify(item);
          lista.appendChild(li);
        });
        bloco.appendChild(lista);
        card.appendChild(bloco);
      });

      app.appendChild(card);
    });

    if (dados.length === 0) {
      app.innerHTML = '<p class="text-neutral-500">Nenhum digest encontrado em curadoria/ ainda.</p>';
    }
  </script>
